


<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Data Tracker - Search</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .container { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2); max-width: 600px; width: 100%; }
        h1 { color: #333; margin-bottom: 30px; text-align: center; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #555; font-weight: 600; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 16px; }
        input:focus { outline: none; border-color: #667eea; }
        button { width: 100%; padding: 12px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 20px; }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4); }
        #results { margin-top: 30px; }
        .result-card { background: #f9f9f9; padding: 15px; border-left: 4px solid #667eea; margin: 10px 0; border-radius: 4px; }
        .result-title { font-weight: 600; margin-bottom: 8px; font-size: 16px; }
        .result-detail { margin: 5px 0; font-size: 14px; color: #666; }
        .no-data { color: #999; text-align: center; padding: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📱 User Data Tracker</h1>
        
        <div class="form-group">
            <label for="facebookId">Facebook ID:</label>
            <input type="text" id="facebookId" placeholder="Enter Facebook ID" onkeypress="if(event.key==='Enter') searchData()">
        </div>
        
        <button onclick="searchData()">🔍 Search</button>
        
        <div id="results"></div>
    </div>

    <script>
        async function searchData() {
            const facebookId = document.getElementById('facebookId').value.trim();
            const resultsDiv = document.getElementById('results');
            
            if (!facebookId) {
                resultsDiv.innerHTML = '<div class="no-data">Please enter a Facebook ID</div>';
                return;
            }

            try {
                const response = await fetch('/api/search', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ facebookId })
                });

                const data = await response.json();

                if (!data.success) {
                    resultsDiv.innerHTML = '<div class="no-data">Error: ' + (data.error || 'Unknown error') + '</div>';
                    return;
                }

                let html = `<h2>Results for ID: ${facebookId}</h2>`;

                if (data.data.locations && data.data.locations.length > 0) {
                    html += '<h3>📍 Locations</h3>';
                    data.data.locations.forEach(loc => {
                        html += `
                            <div class="result-card">
                                <div class="result-title">${loc.city}, ${loc.country}</div>
                                <div class="result-detail">Latitude: ${loc.latitude}</div>
                                <div class="result-detail">Longitude: ${loc.longitude}</div>
                                <div class="result-detail">Timestamp: ${loc.timestamp}</div>
                            </div>
                        `;
                    });
                } else {
                    html += '<div class="no-data">No locations found</div>';
                }

                if (data.data.devices && data.data.devices.length > 0) {
                    html += '<h3>📱 Devices & IMEI</h3>';
                    data.data.devices.forEach(dev => {
                        html += `
                            <div class="result-card">
                                <div class="result-title">${dev.deviceName}</div>
                                <div class="result-detail">OS: ${dev.osType} ${dev.osVersion}</div>
                                <div class="result-detail">IMEI: ${dev.imei || 'N/A'}</div>
                                <div class="result-detail">Last Active: ${dev.lastActive}</div>
                            </div>
                        `;
                    });
                } else {
                    html += '<div class="no-data">No devices found</div>';
                }

                resultsDiv.innerHTML = html;
            } catch (error) {
                resultsDiv.innerHTML = '<div class="no-data">Error: ' + error.message + '</div>';
            }
        }
    </script>
</body>
</html>
