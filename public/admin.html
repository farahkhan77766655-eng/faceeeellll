<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial; background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        .header { background: white; padding: 30px; text-align: center; border-radius: 12px 12px 0 0; box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2); }
        .header h1 { color: #1e3c72; margin: 0; }
        .card { background: white; padding: 30px; margin: 0; border-radius: 0 0 12px 12px; box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2); }
        .card + .card { margin-top: 20px; border-radius: 12px; }
        .card h2 { color: #1e3c72; margin-bottom: 20px; border-bottom: 2px solid #2a5298; padding-bottom: 10px; }
        .card h3 { color: #2a5298; margin-top: 20px; margin-bottom: 10px; }
        input { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 6px; }
        button { width: 100%; padding: 12px; background: #2a5298; color: white; border: none; border-radius: 6px; cursor: pointer; margin-top: 15px; font-weight: 600; }
        button:hover { background: #1e3c72; }
        .message { padding: 12px; margin: 10px 0; border-radius: 6px; display: none; }
        .message.show { display: block; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        #adminPanel { display: none; }
        .logout { background: #ff6b6b !important; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔐 Admin Panel</h1>
        </div>

        <div id="loginCard" class="card">
            <h2>Login</h2>
            <input type="password" id="password" placeholder="Password" onkeypress="if(event.key==='Enter') login()">
            <button onclick="login()">Login</button>
            <div id="loginMessage" class="message"></div>
        </div>

        <div id="adminPanel">
            <div class="card">
                <h2>Add User</h2>
                <input type="text" id="facebookId" placeholder="Facebook ID">
                <h3>📍 Location</h3>
                <input type="text" id="city" placeholder="City">
                <input type="text" id="country" placeholder="Country">
                <input type="number" id="latitude" placeholder="Latitude" step="0.0001">
                <input type="number" id="longitude" placeholder="Longitude" step="0.0001">
                <input type="text" id="timestamp" placeholder="Timestamp">
                <h3>📱 Device</h3>
                <input type="text" id="deviceName" placeholder="Device Name">
                <input type="text" id="osType" placeholder="OS Type">
                <input type="text" id="osVersion" placeholder="OS Version">
                <input type="text" id="imei" placeholder="IMEI">
                <button onclick="save()">Save User</button>
                <div id="saveMessage" class="message"></div>
            </div>

            <div class="card">
                <h2>Change Password</h2>
                <input type="password" id="newPassword" placeholder="New Password">
                <button onclick="changePwd()">Change Password</button>
                <div id="pwdMessage" class="message"></div>
            </div>

            <div class="card">
                <button onclick="logout()" class="logout">Logout</button>
            </div>
        </div>
    </div>

    <script>
        let adminPassword = '';

        function login() {
            if (document.getElementById('password').value === 'admin123') {
                adminPassword = 'admin123';
                document.getElementById('loginCard').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';
                msg('loginMessage', '✅ Logged in!', 'success');
            } else {
                msg('loginMessage', '❌ Wrong password!', 'error');
            }
        }

        function logout() {
            adminPassword = '';
            document.getElementById('adminPanel').style.display = 'none';
            document.getElementById('loginCard').style.display = 'block';
            document.getElementById('password').value = '';
        }

        async function save() {
            const id = document.getElementById('facebookId').value.trim();
            const city = document.getElementById('city').value.trim();
            const device = document.getElementById('deviceName').value.trim();
            const ts = document.getElementById('timestamp').value.trim();

            if (!id || !city || !device) {
                msg('saveMessage', '❌ Fill required fields!', 'error');
                return;
            }

            try {
                const res = await fetch('/api/admin/update-user', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        password: adminPassword,
                        facebookId: id,
                        locations: [{
                            city: city,
                            country: document.getElementById('country').value || '',
                            latitude: parseFloat(document.getElementById('latitude').value) || 0,
                            longitude: parseFloat(document.getElementById('longitude').value) || 0,
                            timestamp: ts
                        }],
                        devices: [{
                            deviceName: device,
                            osType: document.getElementById('osType').value || '',
                            osVersion: document.getElementById('osVersion').value || '',
                            imei: document.getElementById('imei').value || '',
                            lastActive: ts
                        }]
                    })
                });

                const data = await res.json();
                if (data.success) {
                    msg('saveMessage', '✅ User saved!', 'success');
                    document.getElementById('facebookId').value = '';
                    document.getElementById('city').value = '';
                    document.getElementById('deviceName').value = '';
                } else {
                    msg('saveMessage', '❌ Error: ' + data.error, 'error');
                }
            } catch (e) {
                msg('saveMessage', '❌ Error: ' + e.message, 'error');
            }
        }

        async function changePwd() {
            const newPwd = document.getElementById('newPassword').value;
            if (!newPwd) {
                msg('pwdMessage', '❌ Enter password!', 'error');
                return;
            }

            try {
                const res = await fetch('/api/admin/change-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        currentPassword: adminPassword,
                        newPassword: newPwd
                    })
                });

                const data = await res.json();
                if (data.success) {
                    adminPassword = newPwd;
                    msg('pwdMessage', '✅ Changed!', 'success');
                    document.getElementById('newPassword').value = '';
                } else {
                    msg('pwdMessage', '❌ Error: ' + data.error, 'error');
                }
            } catch (e) {
                msg('pwdMessage', '❌ Error: ' + e.message, 'error');
            }
        }

        function msg(id, text, type) {
            const el = document.getElementById(id);
            el.textContent = text;
            el.className = 'message show ' + type;
            setTimeout(() => { el.className = 'message'; }, 3000);
        }
    </script>
</body>
</html>
